name: Deploy to VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # Navigate to project directory (create if missing)
            mkdir -p ~/Production/cattle-management
            cd ~/Production/cattle-management

            # Clone if not exists, otherwise pull
            if [ ! -d ".git" ]; then
              git clone https://github.com/a2mus/Virtual-Fencing---Health-Monitoring-System.git .
            else
              git pull origin main
            fi

            # Deploy with Production Configuration
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d --build --remove-orphans
            
            # Prune unused images to save space
            docker image prune -f
